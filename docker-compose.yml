services:
    web:
        image: nginx:alpine
        ports:
            - "8000:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
    app:
        build:
            context: .
            dockerfile: Dockerfile
        volumes:
            - ./:/var/www/html
        depends_on:
            db:
                condition: service_healthy
        env_file:
            - .env
    db:
        image: mysql:8.0
        ports:
            - "3307:3306"
        env_file:
            - .env
        volumes:
            - db_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            timeout: 20s
            retries: 10
    node:
        image: node:24.14.0-alpine
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
        ports:
            - "5173:5173"
        command: sh -c "npm install -g npm@11.12.0 && npm install && npm run dev -- --host 0.0.0.0"
volumes:
    db_data: