services:
    web:
        image: nginx:alpine
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./docker/nginx/:/etc/nginx/conf.d/
            - app_public:/var/www/html/public:ro
            - /etc/letsencrypt:/etc/letsencrypt:ro
        depends_on:
            - app
    app:
        image: ghcr.io/xenarisis/projet-saonelocal:latest
        volumes:
            - app_public:/var/www/html/public
        env_file:
            - .env
        depends_on:
            db:
                condition: service_healthy
    db:
        image: mysql:8.0
        command: --innodb-buffer-pool-size=64M --max-connections=50 --key-buffer-size=16M
        env_file:
            - .env
        volumes:
            - db_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            timeout: 20s
            retries: 10
volumes:
    db_data:
    app_public: