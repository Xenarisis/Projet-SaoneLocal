name: Laravel

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  docker-build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push of Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/xenarisis/projet-saonelocal:latest

  newman-test:
    name: Newman Test
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      
      - name: Give perms *
        run: chmod -R 777 .
      
      - name: Create dummy .env for tests
        run: |
          cp .env.example .env

          echo "JWT_SECRET=$(openssl rand -hex 32)" >> .env
          echo "APP_KEY=base64:$(openssl rand -base64 32)" >> .env
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=db" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=saonelocal_app" >> .env
          echo "DB_USERNAME=laravel_user" >> .env
          echo "DB_PASSWORD=test_password" >> .env
          echo "MYSQL_DATABASE=saonelocal_app" >> .env
          echo "MYSQL_USER=laravel_user" >> .env
          echo "MYSQL_PASSWORD=test_password" >> .env
          echo "MYSQL_ROOT_PASSWORD=test_password" >> .env

      - name: Starting API
        run: docker compose -f docker-compose.yml up -d
      
      - name: Install Newman & Wait-on
        run: npm install -g newman wait-on
      
      - name: Check Containers Status
        run: docker ps -a
        
      - name: Display Docker Logs (Debug)
        run: docker compose -f docker-compose.yml logs
      
      - name: Install Newman & Wait-on
        run: npm install -g newman wait-on
      
      - name: Waiting API and BDD
        run: |
          sleep 140
          
          echo "Debug :"
          curl -v http://localhost:8000/api/health
          
          echo "Lancement de wait-on :"
          wait-on http-get://localhost:8000/api/health -t 60000

      - name: Run Postman Collection
        run: |
          for file in tests/api/*.postman_collection.json; do
            echo "Run collection : $file"
            newman run "$file"
          done

  deploy-to-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [docker-build-and-push, newman-test]
    if: github.ref == 'refs/heads/main' 
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Cp to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml,docker/nginx/"
          target: "/home/${{ secrets.EC2_USERNAME }}/projet-saonelocal"

      - name: Deploying using SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USERNAME }}/projet-saonelocal
            
            echo "APP_ENV=production" > .env
            echo "APP_DEBUG=false" >> .env
            echo "APP_KEY=${{ secrets.ENV_PROD_APP_KEY }}" >> .env
            echo "DB_CONNECTION=mysql" >> .env
            echo "DB_HOST=db" >> .env
            echo "DB_PORT=3306" >> .env
            echo "DB_DATABASE=saonelocal_app" >> .env
            echo "DB_USERNAME=laravel_user" >> .env
            echo "DB_PASSWORD=${{ secrets.ENV_PROD_DB_PASSWORD }}" >> .env
            echo "MYSQL_DATABASE=saonelocal_app" >> .env
            echo "MYSQL_USER=laravel_user" >> .env
            echo "MYSQL_PASSWORD=${{ secrets.ENV_PROD_DB_PASSWORD }}" >> .env
            echo "MYSQL_ROOT_PASSWORD=${{ secrets.ENV_PROD_DB_ROOT_PASSWORD }}" >> .env
            echo "JWT_SECRET=${{ secrets.ENV_PROD_JWT_SECRET }}" >> .env
            
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            sudo docker compose -f docker-compose.prod.yml pull
            sudo docker compose -f docker-compose.prod.yml up -d
            
            sudo docker image prune -af