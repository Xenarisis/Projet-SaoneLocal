name: Laravel

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  docker-build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push of Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/xenarisis/projet-saonelocal:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  newman-test:
    name: Newman Test
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      
      - name: Prepare Laravel Folders & Permissions
        run: |
          mkdir -p vendor
          mkdir -p storage/framework/views
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/sessions
          mkdir -p storage/logs
          mkdir -p bootstrap/cache
          
          chmod -R 777 .
      
      - name: Create test .env
        run: |
          cat <<EOF > .env
          APP_ENV=testing
          APP_KEY=base64:$(openssl rand -base64 32)
          APP_DEBUG=true
          CACHE_STORE=array
          SESSION_DRIVER=array
          QUEUE_CONNECTION=sync
          JWT_SECRET=$(openssl rand -hex 32)
          JWT_ALGO=HS256
          JWT_TTL=60
          DB_CONNECTION=mysql
          DB_HOST=db
          DB_PORT=3306
          DB_DATABASE=saonelocal_app
          DB_USERNAME=laravel_user
          DB_PASSWORD=test_password
          MYSQL_DATABASE=saonelocal_app
          MYSQL_USER=laravel_user
          MYSQL_PASSWORD=test_password
          MYSQL_ROOT_PASSWORD=test_password
          EOF

      - name: Starting API
        run: docker compose -f docker-compose.yml up -d
      
      - name: Install Newman & Wait-on
        run: npm install -g newman wait-on
      
      - name: Waiting API and BDD
        run: wait-on http-get://localhost:8000/api/health -t 140000 -i 2000

      - name: Run Postman Collection
        run: |
          for file in tests/api/*.postman_collection.json; do
            echo "Run collection : $file"
            newman run "$file"
          done

      - name: Display Docker Logs (Debug)
        if: failure()
        run: docker compose -f docker-compose.yml logs

  deploy-to-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [docker-build-and-push, newman-test]
    if: github.ref == 'refs/heads/main' 
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Cp to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml,docker/nginx/"
          target: "/home/${{ secrets.EC2_USERNAME }}/projet-saonelocal"

      - name: Deploying using SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USERNAME }}/projet-saonelocal
            
            cat <<EOF > .env
            APP_ENV=production
            APP_DEBUG=false
            APP_KEY=${{ secrets.ENV_PROD_APP_KEY }}
            DB_CONNECTION=mysql
            DB_HOST=db
            DB_PORT=3306
            DB_DATABASE=saonelocal_app
            DB_USERNAME=laravel_user
            DB_PASSWORD=${{ secrets.ENV_PROD_DB_PASSWORD }}
            MYSQL_DATABASE=saonelocal_app
            MYSQL_USER=laravel_user
            MYSQL_PASSWORD=${{ secrets.ENV_PROD_DB_PASSWORD }}
            MYSQL_ROOT_PASSWORD=${{ secrets.ENV_PROD_DB_ROOT_PASSWORD }}
            JWT_SECRET=${{ secrets.ENV_PROD_JWT_SECRET }}
            EOF
            
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            sudo docker compose -f docker-compose.prod.yml pull
            sudo docker compose -f docker-compose.prod.yml up -d
            
            sudo docker image prune -af